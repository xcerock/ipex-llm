name: Build llama.cpp with Gemma 4 support (Windows + Intel SYCL)

on:
  workflow_dispatch:
    inputs:
      llama_cpp_ref:
        description: 'llama.cpp branch/tag/commit (default: master)'
        default: 'master'
        required: false
        type: string
      release_tag:
        description: 'GitHub release tag (e.g. v2.3.0-gemma4). Empty = artifact only.'
        default: ''
        required: false
        type: string
  push:
    tags:
      - 'v*-gemma4'

permissions:
  contents: write

jobs:
  build-windows-sycl:
    name: Build Windows SYCL binaries
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      LLAMA_CPP_COMMIT: ''
      ZIP_NAME: ''

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout xcerock/ipex-llm
        uses: actions/checkout@v4

      # ── 2. Clone llama.cpp ─────────────────────────────────────────────────
      - name: Clone llama.cpp
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.llama_cpp_ref }}"
          if (-not $ref) { $ref = "master" }

          Write-Host "Cloning ggml-org/llama.cpp @ $ref ..."
          git clone --depth=1 --branch $ref `
            https://github.com/ggml-org/llama.cpp.git llama_cpp_src

          if ($LASTEXITCODE -ne 0) {
            Write-Host "Branch '$ref' not found, cloning default branch then checking out..."
            git clone --depth=1 https://github.com/ggml-org/llama.cpp.git llama_cpp_src
            Set-Location llama_cpp_src
            git fetch --depth=1 origin $ref
            git checkout $ref
            Set-Location ..
          }

          $commit = (git -C llama_cpp_src rev-parse --short HEAD)
          Write-Host "llama.cpp commit: $commit"
          "LLAMA_CPP_COMMIT=$commit" | Out-File -FilePath $env:GITHUB_ENV -Append

          # Verify gemma4 support is present
          $found = Select-String -Path "llama_cpp_src\src\*.cpp" -Pattern "gemma4" -Quiet 2>$null
          if ($found) {
            Write-Host "OK: gemma4 architecture found in this llama.cpp version"
            "GEMMA4_OK=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Warning "gemma4 NOT found — try a newer commit. Build will continue anyway."
            "GEMMA4_OK=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      # ── 3. Set up conda with Intel channel ────────────────────────────────
      - name: Setup conda (Miniconda)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: latest
          activate-environment: sycl-build
          python-version: '3.11'

      # ── 4. Install Intel DPC++, MKL and TBB via conda ─────────────────────
      #    Intel officially maintains these packages on the 'intel' conda channel.
      #    This avoids having to download the full oneAPI installer (~30GB offline).
      - name: Install Intel oneAPI via conda
        shell: bash -l {0}
        run: |
          # dpcpp_impl_win-64   → icx.exe compiler
          # mkl-devel           → MKL headers + classic (CPU) import libs
          # mkl-dpcpp           → MKL SYCL BLAS component (mkl_sycl_blas.dll)
          # tbb-devel           → TBB
          conda install -y \
            -c https://software.repos.intel.com/python/conda/ \
            -c conda-forge \
            dpcpp_impl_win-64 \
            mkl-devel \
            mkl-dpcpp \
            tbb-devel
          echo "Installed packages:"
          conda list | grep -E "dpcpp|mkl|tbb"
          echo "---"
          # Report whether mkl_sycl_blas.dll is now present
          if find "$CONDA_PREFIX" -name "mkl_sycl_blas*.dll" 2>/dev/null | grep -q .; then
            echo "OK: mkl_sycl_blas found"
          else
            echo "WARNING: mkl_sycl_blas.dll still absent — cmake will be patched"
          fi
          ICX=$(find "$CONDA_PREFIX" -name "icx.exe" 2>/dev/null | head -1)
          echo "ICX compiler: $ICX"
          echo "CONDA_PREFIX=$CONDA_PREFIX" >> $GITHUB_ENV
          echo "ICX_PATH=$ICX" >> $GITHUB_ENV

      # ── 5. Patch llama.cpp cmake: make MKL SYCL targets optional ─────────
      #    mkl_sycl_blas is not in the conda mkl-devel package (it requires
      #    the full oneAPI installer). We patch ggml-sycl/CMakeLists.txt to
      #    wrap any unconditional use of MKL::MKL_SYCL::* in if(TARGET ...).
      #    This allows the build to succeed with CPU-SYCL fallback paths.
      - name: Patch llama.cpp cmake for optional MKL SYCL
        shell: pwsh
        run: |
          $file = "llama_cpp_src\ggml\src\ggml-sycl\CMakeLists.txt"
          if (-not (Test-Path $file)) {
            Write-Warning "ggml-sycl CMakeLists.txt not found — skipping patch"
            exit 0
          }

          # Check if mkl_sycl_blas IMPORT LIBRARY (.lib) exists — the DLL alone is not enough.
          # conda mkl-dpcpp ships the runtime DLL but NOT the .lib needed for the linker.
          # We check for the .lib here; if absent the cmake patch is required.
          $condaPrefix = $env:CONDA_PREFIX
          $syclBlasLib = Get-ChildItem "$condaPrefix\Library\lib" -Filter "mkl_sycl_blas*dll*.lib" `
                         -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($syclBlasLib) {
            Write-Host "mkl_sycl_blas import lib found at $($syclBlasLib.FullName) — no cmake patch needed"
            exit 0
          }

          Write-Host "mkl_sycl_blas import lib NOT found (DLL may exist but .lib is missing)"
          Write-Host "Patching cmake to make MKL::MKL_SYCL::* optional..."
          $lines = Get-Content $file
          $out   = [System.Collections.Generic.List[string]]::new()
          foreach ($line in $lines) {
            # Match any target_link_libraries call that references MKL::MKL_SYCL::
            if ($line -match 'target_link_libraries\b.*MKL::MKL_SYCL::(\w+)') {
              $target = "MKL::MKL_SYCL::$($Matches[1])"
              Write-Host "  Wrapping: $target"
              $out.Add("if(TARGET $target)")
              $out.Add($line)
              $out.Add("endif()")
            } else {
              $out.Add($line)
            }
          }
          $out | Set-Content $file -Encoding UTF8
          Write-Host "Patch applied ($($out.Count) lines)."

          # Also disable any compile definition that gates MKL SYCL code paths
          # (prevents compile errors from unconditional #include of sycl_blas headers)
          $content = Get-Content $file -Raw
          if ($content -match 'GGML_SYCL_WARP_REDUCE_COPY') {
            Write-Host "(no MKL SYCL compile definitions to remove)"
          }

      # ── 6. Set up MSVC (required by icx on Windows for link step) ─────────
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 6. Install CMake and Ninja ─────────────────────────────────────────
      - name: Install CMake and Ninja
        shell: pwsh
        run: |
          choco install cmake ninja --no-progress -y
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";$env:PATH"
          cmake --version
          ninja --version

      # ── 7. Configure CMake with SYCL ──────────────────────────────────────
      - name: Configure llama.cpp (SYCL backend)
        shell: pwsh
        run: |
          $condaPrefix = $env:CONDA_PREFIX
          Write-Host "CONDA_PREFIX: $condaPrefix"

          # Locate icx.exe
          $icx = "$condaPrefix\Library\bin\icx.exe"
          if (-not (Test-Path $icx)) {
            $icx = Get-ChildItem -Path $condaPrefix -Filter "icx.exe" -Recurse -ErrorAction SilentlyContinue |
                   Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $icx) {
            Write-Error "icx.exe not found in conda environment."
            exit 1
          }
          Write-Host "Compiler: $icx"
          & $icx --version

          # ── Fix: libircmt.lib not on linker search path ──────────────────
          # dpcpp_impl_win-64 places Intel runtime libs relative to icx.exe.
          # The linker (invoked by icx) needs to find libircmt.lib.
          # Search the conda env for it and add its directory to LIB.
          Write-Host "Searching for libircmt.lib..."
          $libircmt = Get-ChildItem -Path $condaPrefix -Filter "libircmt.lib" -Recurse `
                      -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($libircmt) {
            $intelLibDir = $libircmt.DirectoryName
            Write-Host "Found libircmt.lib at: $intelLibDir"
            $env:LIB = "$intelLibDir;$env:LIB"
          } else {
            Write-Host "libircmt.lib not found by search — adding candidate Intel lib dirs to LIB..."
            # icx.exe is at: Library\bin\icx.exe (from output)
            # Runtime libs are typically at: Library\bin\compiler\lib  OR  Library\lib
            $icxBin = Split-Path $icx -Parent                        # ..\Library\bin
            $candidates = @(
              "$icxBin\compiler\lib",                                 # Library\bin\compiler\lib
              (Join-Path (Split-Path $icxBin -Parent) "lib"),         # Library\lib
              "$condaPrefix\Library\compiler\lib"
            )
            foreach ($dir in $candidates) {
              if (Test-Path $dir) {
                Write-Host "  + $dir"
                $env:LIB = "$dir;$env:LIB"
              }
            }
          }

          # Print first few entries in LIB so we can diagnose if needed
          Write-Host "LIB (first 5 dirs):"
          ($env:LIB -split ";") | Select-Object -First 5 | ForEach-Object { Write-Host "  $_" }

          # Persist LIB to subsequent steps.
          # $env:LIB changes only survive for this PowerShell step; the Build step
          # would start a new process with the original LIB (missing Intel lib dir).
          # Writing to $GITHUB_ENV makes the value available to all later steps.
          "LIB=$($env:LIB)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "LIB persisted to GITHUB_ENV for subsequent steps"

          # Set ONEAPI_ROOT so cmake recognises this as a proper Intel installation
          # (without it, cmake warns "Using open-source SYCL compiler" and may skip
          # oneAPI-specific MKL search paths)
          $env:ONEAPI_ROOT = "$condaPrefix\Library"
          Write-Host "ONEAPI_ROOT=$($env:ONEAPI_ROOT)"

          # ── Generate mkl_sycl_blas import library if missing ─────────────
          # conda mkl-dpcpp ships mkl_sycl_blas.5.dll but not the import .lib.
          # cmake FindMKL needs the .lib to create the MKL::MKL_SYCL::BLAS target.
          # We generate it from the DLL using lib.exe (available after MSVC setup).
          $mklLibDir = "$condaPrefix\Library\lib"
          $mklBinDir = "$condaPrefix\Library\bin"
          $syclBlasLib = Get-ChildItem $mklLibDir -Filter "mkl_sycl_blas*dll*.lib" `
                         -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $syclBlasLib) {
            Write-Host "mkl_sycl_blas import lib missing — trying to generate from DLL..."
            $syclBlasDll = Get-ChildItem $mklBinDir -Filter "mkl_sycl_blas*.dll" `
                           -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($syclBlasDll) {
              Write-Host "Found DLL: $($syclBlasDll.FullName)"
              # lib.exe is in PATH after ilammy/msvc-dev-cmd
              $libExePath = (Get-Command lib.exe -ErrorAction SilentlyContinue)?.Source
              $dumpbinPath = $null
              if ($libExePath) {
                $dumpbinPath = Join-Path (Split-Path $libExePath -Parent) "dumpbin.exe"
                if (-not (Test-Path $dumpbinPath)) { $dumpbinPath = $null }
              }
              if ($libExePath -and $dumpbinPath) {
                Write-Host "Using: $libExePath"
                # Get export list
                $rawExports = & $dumpbinPath /exports $syclBlasDll.FullName 2>&1
                # Build .def file
                $dllBase = $syclBlasDll.BaseName -replace '\.\d+$', ''   # strip version suffix
                $defLines = [System.Collections.Generic.List[string]]::new()
                $defLines.Add("LIBRARY $dllBase")
                $defLines.Add("EXPORTS")
                $inSection = $false
                foreach ($exportLine in $rawExports) {
                  if ($exportLine -match '^\s+ordinal\s+hint\s+RVA\s+name') { $inSection = $true; continue }
                  if ($inSection -and $exportLine -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)\s*$') {
                    $defLines.Add("    $($Matches[1])")
                  }
                }
                $defFile  = "$mklLibDir\mkl_sycl_blas.def"
                $outLib   = "$mklLibDir\mkl_sycl_blas_dll.lib"
                $defLines | Set-Content $defFile -Encoding ASCII
                Write-Host "DEF file written with $($defLines.Count - 2) exports"
                & $libExePath /def:$defFile /machine:x64 /out:$outLib 2>&1 | ForEach-Object { Write-Host $_ }
                if (Test-Path $outLib) {
                  $kb = [int]((Get-Item $outLib).Length / 1KB)
                  Write-Host "Generated: $outLib ($kb KB) — cmake will now find MKL::MKL_SYCL::BLAS"
                } else {
                  Write-Host "lib.exe did not produce the import library — cmake patch will handle this"
                }
              } else {
                Write-Host "lib.exe/dumpbin.exe not found in PATH — cmake patch will handle this"
              }
            } else {
              Write-Host "mkl_sycl_blas DLL not found — cmake patch will handle this"
            }
          } else {
            Write-Host "mkl_sycl_blas import lib already present: $($syclBlasLib.FullName)"
          }

          # ── Run CMake ────────────────────────────────────────────────────
          cmake -S llama_cpp_src -B llama_cpp_src\build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_SYCL=ON `
            "-DCMAKE_C_COMPILER=$icx" `
            "-DCMAKE_CXX_COMPILER=$icx" `
            -DGGML_SYCL_F16=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=ON `
            "-DMKL_ROOT=$condaPrefix\Library" `
            "-DTBB_ROOT=$condaPrefix\Library"

      # ── 8. Build ───────────────────────────────────────────────────────────
      - name: Build llama.cpp
        shell: pwsh
        run: |
          cmake --build llama_cpp_src\build --config Release -j $env:NUMBER_OF_PROCESSORS

      # ── 9. Package ─────────────────────────────────────────────────────────
      - name: Package release
        shell: pwsh
        run: |
          $out = "release-win"
          New-Item -ItemType Directory -Path $out -Force | Out-Null

          # Find the bin directory (layout varies by llama.cpp version)
          $binCandidates = @(
            "llama_cpp_src\build\bin\Release",
            "llama_cpp_src\build\bin",
            "llama_cpp_src\build"
          )
          $binDir = $binCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Copying binaries from: $binDir"

          Get-ChildItem $binDir -Filter "*.exe" |
            Where-Object { $_.Name -notmatch "^(test-|llama-test)" } |
            ForEach-Object { Write-Host "  EXE: $($_.Name)"; Copy-Item $_.FullName $out }

          Get-ChildItem $binDir -Filter "*.dll" |
            ForEach-Object { Write-Host "  DLL: $($_.Name)"; Copy-Item $_.FullName $out }

          # Collect required Intel runtime DLLs
          # With conda install, DLLs are in $CONDA_PREFIX\Library\bin
          $condaPrefix = $env:CONDA_PREFIX
          $oneapiSearchPaths = @(
            "$condaPrefix\Library\bin",
            "$condaPrefix\bin",
            "$condaPrefix\Library\lib",
            # Also check traditional oneAPI paths as fallback
            "C:\Program Files (x86)\Intel\oneAPI\compiler\latest\bin",
            "C:\Program Files (x86)\Intel\oneAPI\mkl\latest\bin",
            "C:\Program Files (x86)\Intel\oneAPI\tbb\latest\bin"
          )
          $dllPatterns = @(
            "sycl?.dll","sycl??.dll","OpenCL.dll",
            "ur_loader.dll","ur_adapter_level_zero.dll","ur_adapter_opencl.dll","ur_win_proxy_loader.dll",
            "mkl_core.*.dll","mkl_sycl_blas.*.dll","mkl_tbb_thread.*.dll",
            "tbb12.dll","tbbmalloc.dll","dnnl.dll",
            "libiomp5md.dll","libmmd.dll","svml_dispmd.dll"
          )
          foreach ($dir in $oneapiSearchPaths) {
            if (-not (Test-Path $dir)) { continue }
            foreach ($pat in $dllPatterns) {
              Get-ChildItem $dir -Filter $pat -ErrorAction SilentlyContinue | ForEach-Object {
                if (-not (Test-Path "$out\$($_.Name)")) {
                  Write-Host "  [oneAPI] $($_.Name)"
                  Copy-Item $_.FullName $out
                }
              }
            }
          }

          # README
          $commit = $env:LLAMA_CPP_COMMIT
          $lines = @(
            "llama.cpp for Intel GPU (Windows) - Gemma 4 support",
            "=====================================================",
            "Built from : https://github.com/ggml-org/llama.cpp @ $commit",
            "SYCL backend : enabled",
            "Gemma 4 (gemma4 arch) : supported",
            "",
            "QUICK START",
            "-----------",
            "1. Open Command Prompt, cd to this folder",
            "2. set SYCL_CACHE_PERSISTENT=1",
            "3. llama-cli.exe -m gemma-4-E4B-it-Q4_K_M.gguf -n 256 --prompt `"What is AI?`" -ngl 99",
            "",
            "OPTIONAL",
            "--------",
            "set SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1  (may improve performance)",
            "set ONEAPI_DEVICE_SELECTOR=level_zero:0               (single GPU)",
            "",
            "REQUIREMENTS",
            "------------",
            "- Intel Arc / Iris Xe GPU",
            "- Intel GPU driver >= 31.0.101.5522",
            "  https://www.intel.com/content/www/us/en/download/785597"
          )
          $lines | Out-File "$out\README.txt" -Encoding utf8

          Write-Host "`nPackage contents ($((Get-ChildItem $out).Count) files):"
          Get-ChildItem $out | Format-Table Name, @{N='Size(KB)';E={[int]($_.Length/1KB)}} -AutoSize

      # ── 10. Zip ────────────────────────────────────────────────────────────
      - name: Create ZIP
        shell: pwsh
        run: |
          $zip = "llama-cpp-gemma4-win-${{ env.LLAMA_CPP_COMMIT }}.zip"
          Compress-Archive -Path "release-win\*" -DestinationPath $zip -Force
          $sizeMB = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Created $zip ($sizeMB MB)"
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── 11. Upload artifact ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-gemma4-win-${{ env.LLAMA_CPP_COMMIT }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ── 12. Create GitHub Release (optional) ──────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "llama.cpp Intel GPU — Gemma 4 (${{ env.LLAMA_CPP_COMMIT }})"
          body: |
            ## llama.cpp Windows portable ZIP with Gemma 4 support

            ipex-llm 2.2.0 is based on llama.cpp `d7cfe1f` which predates Gemma 4.
            This release uses a newer llama.cpp that supports the `gemma4` GGUF architecture.

            **llama.cpp commit:** `${{ env.LLAMA_CPP_COMMIT }}`
            **Intel SYCL backend:** enabled
            **Gemma 4:** supported

            ### Usage
            ```cmd
            set SYCL_CACHE_PERSISTENT=1
            llama-cli.exe -m gemma-4-E4B-it-Q4_K_M.gguf -n 256 --prompt "What is AI?" -ngl 99
            ```
          files: ${{ env.ZIP_NAME }}
          prerelease: true

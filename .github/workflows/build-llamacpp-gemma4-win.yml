name: Build llama.cpp with Gemma 4 support (Windows + Intel SYCL)

# This workflow builds llama.cpp binaries with Intel SYCL backend for Windows.
# It produces a portable ZIP similar to llama-cpp-ipex-llm releases but with
# Gemma 4 (gemma4 architecture) support enabled via the latest upstream llama.cpp.
#
# Background: ipex-llm 2.2.0 is based on llama.cpp commit d7cfe1f which predates
# Gemma 4 support. This workflow uses a newer llama.cpp that includes the gemma4
# architecture, allowing models like gemma-4-E4B-it-Q4_K_M.gguf to run on Intel GPUs.

on:
  workflow_dispatch:
    inputs:
      llama_cpp_ref:
        description: 'llama.cpp branch, tag, or commit SHA to build from'
        default: 'master'
        required: false
        type: string
      release_tag:
        description: 'Tag name for the release (e.g. v2.3.0-gemma4). Leave empty to only upload artifact.'
        default: ''
        required: false
        type: string
  push:
    tags:
      - 'v*-gemma4'

permissions:
  contents: write

jobs:
  build-windows-sycl:
    name: Build Windows SYCL binaries
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout this repository
      # ─────────────────────────────────────────────
      - name: Checkout fork_ipex-llm
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Clone llama.cpp at the specified ref
      # ─────────────────────────────────────────────
      - name: Clone llama.cpp
        shell: bash
        run: |
          REF="${{ github.event.inputs.llama_cpp_ref || 'master' }}"
          echo "Cloning llama.cpp @ ${REF}"
          git clone --depth=1 --branch "${REF}" \
            https://github.com/ggml-org/llama.cpp.git llama_cpp_src || \
          git clone --depth=1 https://github.com/ggml-org/llama.cpp.git llama_cpp_src && \
            cd llama_cpp_src && git checkout "${REF}"

          cd llama_cpp_src
          COMMIT=$(git rev-parse --short HEAD)
          echo "Building from llama.cpp commit: ${COMMIT}"
          echo "LLAMA_CPP_COMMIT=${COMMIT}" >> $GITHUB_ENV

          # Verify gemma4 architecture is present in this version
          if grep -r "gemma4" src/ --include="*.cpp" --include="*.h" -l 2>/dev/null | head -1; then
            echo "GEMMA4_SUPPORTED=true" >> $GITHUB_ENV
            echo "✓ gemma4 architecture found in this llama.cpp version"
          else
            echo "GEMMA4_SUPPORTED=false" >> $GITHUB_ENV
            echo "⚠ gemma4 architecture NOT found in this commit — try a newer ref"
          fi

      # ─────────────────────────────────────────────
      # 3. Cache Intel oneAPI installation
      # ─────────────────────────────────────────────
      - name: Cache Intel oneAPI
        id: cache-oneapi
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Intel\oneAPI
          key: oneapi-2025.0-dpcpp-mkl-tbb-win

      # ─────────────────────────────────────────────
      # 4. Install Intel oneAPI (DPC++, MKL, TBB)
      #    Only runs if not cached.
      # ─────────────────────────────────────────────
      - name: Install Intel oneAPI Base Toolkit (minimal)
        if: steps.cache-oneapi.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Write-Host "Downloading Intel oneAPI network installer..."
          $installerUrl = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/96aa5993-5b22-4a9b-91ab-da679f422594/intel-oneapi-base-toolkit-2025.0.1.47_offline.exe"

          # Fallback: use the online installer with component selection
          $networkInstallerUrl = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/intel-oneapi-base-toolkit-2025.0-windows.exe"

          $components = @(
            "intel.oneapi.win.dpcpp-compiler",
            "intel.oneapi.win.mkl.devel",
            "intel.oneapi.win.tbb.devel"
          ) -join ":"

          $installer = "$env:TEMP\oneapi_installer.exe"

          try {
            Write-Host "Attempting offline installer download..."
            Invoke-WebRequest -Uri $installerUrl -OutFile $installer -TimeoutSec 300
          } catch {
            Write-Host "Offline installer failed, trying network installer..."
            Invoke-WebRequest -Uri $networkInstallerUrl -OutFile $installer -TimeoutSec 120
          }

          Write-Host "Installing Intel oneAPI components: $components"
          Start-Process -FilePath $installer -ArgumentList @(
            "-s", "--eula", "accept",
            "--components", $components,
            "--install-dir", "C:\Program Files (x86)\Intel\oneAPI",
            "-a", "--silent", "--cli"
          ) -Wait -NoNewWindow

          Write-Host "oneAPI installation complete."

      # Alternative: Use Chocolatey (faster but may have older versions)
      # - name: Install Intel oneAPI via Chocolatey
      #   run: choco install intel-oneapi-dpcpp-compiler intel-oneapi-mkl -y

      # ─────────────────────────────────────────────
      # 5. Verify oneAPI installation
      # ─────────────────────────────────────────────
      - name: Verify oneAPI environment
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 2>&1
          echo --- Compiler version ---
          icx --version
          echo --- Available SYCL devices ---
          sycl-ls 2>nul || echo "(sycl-ls not available in build env)"

      # ─────────────────────────────────────────────
      # 6. Configure CMake with Intel SYCL backend
      # ─────────────────────────────────────────────
      - name: Configure llama.cpp with SYCL
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64

          cd llama_cpp_src
          cmake -B build ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_SYCL=ON ^
            -DCMAKE_C_COMPILER=icx ^
            -DCMAKE_CXX_COMPILER=icx ^
            -DGGML_SYCL_F16=ON ^
            -DBUILD_SHARED_LIBS=ON ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_EXAMPLES=ON

      # ─────────────────────────────────────────────
      # 7. Build
      # ─────────────────────────────────────────────
      - name: Build llama.cpp
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64
          cd llama_cpp_src
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      # ─────────────────────────────────────────────
      # 8. Package binaries and required DLLs
      # ─────────────────────────────────────────────
      - name: Package release ZIP
        shell: powershell
        run: |
          $releaseDir = "release-win"
          New-Item -ItemType Directory -Path $releaseDir -Force

          $buildDir = "llama_cpp_src\build\bin\Release"
          if (-not (Test-Path $buildDir)) {
            $buildDir = "llama_cpp_src\build\bin"
          }
          if (-not (Test-Path $buildDir)) {
            $buildDir = "llama_cpp_src\build"
          }

          Write-Host "Copying EXEs from: $buildDir"
          Get-ChildItem $buildDir -Filter "*.exe" | Where-Object {
            $_.Name -notmatch "test-"
          } | ForEach-Object {
            Write-Host "  + $($_.Name)"
            Copy-Item $_.FullName $releaseDir
          }

          Write-Host "Copying DLLs from build..."
          Get-ChildItem $buildDir -Filter "*.dll" | ForEach-Object {
            Write-Host "  + $($_.Name)"
            Copy-Item $_.FullName $releaseDir
          }

          # Copy Intel oneAPI runtime DLLs needed for SYCL execution
          $oneapiRoots = @(
            "C:\Program Files (x86)\Intel\oneAPI\compiler\latest\bin",
            "C:\Program Files (x86)\Intel\oneAPI\mkl\latest\bin",
            "C:\Program Files (x86)\Intel\oneAPI\tbb\latest\bin\intel64\vc14",
            "C:\Program Files (x86)\Intel\oneAPI\tbb\latest\bin\intel64",
            "C:\Windows\System32"
          )

          $requiredDlls = @(
            "sycl?.dll", "sycl??.dll",
            "OpenCL.dll",
            "ur_loader.dll",
            "ur_adapter_level_zero.dll",
            "ur_adapter_opencl.dll",
            "ur_win_proxy_loader.dll",
            "mkl_core.*.dll",
            "mkl_sycl_blas.*.dll",
            "mkl_tbb_thread.*.dll",
            "tbb12.dll",
            "tbbmalloc.dll",
            "dnnl.dll",
            "libiomp5md.dll",
            "libmmd.dll",
            "svml_dispmd.dll"
          )

          foreach ($root in $oneapiRoots) {
            if (Test-Path $root) {
              foreach ($pattern in $requiredDlls) {
                $found = Get-ChildItem $root -Filter $pattern -ErrorAction SilentlyContinue
                foreach ($f in $found) {
                  if (-not (Test-Path "$releaseDir\$($f.Name)")) {
                    Write-Host "  [oneAPI] + $($f.Name)"
                    Copy-Item $f.FullName $releaseDir
                  }
                }
              }
            }
          }

          # Write README
          $commit = $env:LLAMA_CPP_COMMIT
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          $readme = @"
          llama.cpp for Intel GPU (Windows) — with Gemma 4 support
          ============================================================
          Built from: https://github.com/ggml-org/llama.cpp @ ${commit}
          Build date: ${buildDate}
          Intel SYCL backend: enabled
          Gemma 4 (gemma4 architecture): supported

          QUICK START
          -----------
          1. Set environment:
             set SYCL_CACHE_PERSISTENT=1

          2. Run Gemma 4 (text-only GGUF):
             llama-cli.exe -m gemma-4-E4B-it-Q4_K_M.gguf -n 256 --prompt "What is AI?" -ngl 99

          3. Optional performance boost:
             set SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1

          NOTES
          -----
          - Built to add Gemma 4 support that was missing in ipex-llm 2.2.0
          - Requires Intel GPU driver >= 31.0.101.5522
          - For multi-GPU: set ONEAPI_DEVICE_SELECTOR=level_zero:0
          "@
          $readme | Out-File "$releaseDir\README.txt" -Encoding utf8

          Write-Host "`nRelease package contents:"
          Get-ChildItem $releaseDir | Format-Table Name, Length -AutoSize

      # ─────────────────────────────────────────────
      # 9. Create ZIP archive
      # ─────────────────────────────────────────────
      - name: Create ZIP archive
        shell: powershell
        run: |
          $zipName = "llama-cpp-gemma4-win-${{ env.LLAMA_CPP_COMMIT }}.zip"
          Compress-Archive -Path "release-win\*" -DestinationPath $zipName
          Write-Host "Created: $zipName ($('{0:N0}' -f (Get-Item $zipName).Length) bytes)"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ─────────────────────────────────────────────
      # 10. Upload as GitHub Actions artifact
      # ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-gemma4-win-${{ env.LLAMA_CPP_COMMIT }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ─────────────────────────────────────────────
      # 11. Create GitHub Release (only if tag input given)
      # ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: "llama.cpp for Intel GPU — Gemma 4 support (${{ env.LLAMA_CPP_COMMIT }})"
          body: |
            ## llama.cpp Windows release with Gemma 4 support

            This release adds support for the `gemma4` GGUF architecture (Gemma 4 models),
            which was missing in ipex-llm 2.2.0 (based on llama.cpp commit `d7cfe1f`).

            **Built from:** ggml-org/llama.cpp @ `${{ env.LLAMA_CPP_COMMIT }}`
            **Intel SYCL backend:** enabled
            **Gemma 4 support:** ✓

            ### Usage
            ```cmd
            set SYCL_CACHE_PERSISTENT=1
            llama-cli.exe -m gemma-4-E4B-it-Q4_K_M.gguf -n 256 --prompt "What is AI?" -ngl 99
            ```

            ### Requirements
            - Intel GPU (Arc, Iris Xe, or newer)
            - Intel GPU driver >= 31.0.101.5522
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: true
